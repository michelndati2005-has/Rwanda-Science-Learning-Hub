<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EduBuild — International School Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0A1628;--blue:#1B4FD8;--blue2:#2563EB;--sky:#38BDF8;
  --teal:#0D9488;--green:#16A34A;--amber:#D97706;--red:#DC2626;--purple:#7C3AED;
  --bg:#F1F5FB;--surface:#fff;--surface2:#F8FAFF;--border:#E2E8F4;
  --text:#0F172A;--muted:#64748B;--light:#94A3B8;
  --r:12px;--r2:18px;
  --shadow:0 4px 20px rgba(10,22,40,0.08);
  --shadow2:0 12px 40px rgba(10,22,40,0.14);
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden}
a{color:var(--blue);text-decoration:none}
h1,h2,h3,.serif{font-family:'DM Serif Display',serif}
.mono{font-family:'JetBrains Mono',monospace}

/* ═══ SCREENS ═══ */
.screen{display:none;min-height:100vh}
.screen.active{display:block}

/* ═══════════════════════════
   LOGIN
═══════════════════════════ */
#loginScreen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--navy);position:relative;overflow:hidden;padding:2rem;
}
#loginScreen.active{display:flex}
.login-bg-orbs{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.18}
.orb1{width:500px;height:500px;background:#1B4FD8;top:-100px;right:-100px}
.orb2{width:400px;height:400px;background:#0D9488;bottom:-100px;left:-80px}
.orb3{width:300px;height:300px;background:#7C3AED;top:40%;left:40%}
.login-card{
  position:relative;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);
  backdrop-filter:blur(20px);border-radius:24px;padding:2.5rem 2rem;
  width:100%;max-width:420px;box-shadow:0 30px 80px rgba(0,0,0,0.4);
  animation:fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) both;
}
.login-brand{text-align:center;margin-bottom:2rem}
.login-brand .wordmark{font-family:'DM Serif Display',serif;font-size:2rem;color:#fff;letter-spacing:-0.02em}
.login-brand .wordmark span{color:var(--sky)}
.login-brand .tagline{font-size:0.75rem;color:rgba(255,255,255,0.4);letter-spacing:0.15em;text-transform:uppercase;margin-top:0.3rem}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.8rem}
.role-btn{
  padding:0.8rem 0.5rem;border-radius:10px;border:1px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.55);
  cursor:pointer;transition:all 0.2s;text-align:center;font-size:0.75rem;
  font-weight:600;font-family:inherit;letter-spacing:0.02em;
}
.role-btn .role-emoji{display:block;font-size:1.4rem;margin-bottom:0.3rem}
.role-btn:hover{background:rgba(255,255,255,0.1);color:#fff}
.role-btn.selected{background:rgba(27,79,216,0.4);border-color:var(--blue2);color:#fff;box-shadow:0 0 0 2px rgba(27,79,216,0.4)}
.lfield{margin-bottom:1rem}
.lfield label{display:block;font-size:0.7rem;font-weight:600;color:rgba(255,255,255,0.4);margin-bottom:0.4rem;text-transform:uppercase;letter-spacing:0.08em}
.lfield input{
  width:100%;padding:0.75rem 1rem;border:1px solid rgba(255,255,255,0.12);
  border-radius:10px;font-size:0.9rem;font-family:inherit;outline:none;
  background:rgba(255,255,255,0.07);color:#fff;transition:all 0.2s;
}
.lfield input::placeholder{color:rgba(255,255,255,0.2)}
.lfield input:focus{border-color:var(--blue2);background:rgba(27,79,216,0.15)}
.login-submit{
  width:100%;padding:0.85rem;background:var(--blue2);color:#fff;
  border:none;border-radius:10px;font-size:0.9rem;font-weight:700;
  cursor:pointer;transition:all 0.2s;font-family:inherit;margin-top:0.5rem;
  letter-spacing:0.03em;
}
.login-submit:hover{background:#1D4ED8;transform:translateY(-1px);box-shadow:0 8px 24px rgba(37,99,235,0.4)}
.login-submit:active{transform:none}
.login-err{
  background:rgba(220,38,38,0.15);color:#FCA5A5;border:1px solid rgba(220,38,38,0.3);
  border-radius:8px;padding:0.6rem 0.9rem;font-size:0.8rem;font-weight:600;
  text-align:center;margin-top:0.8rem;display:none;
}
.login-creds{
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
  border-radius:8px;padding:0.75rem 1rem;margin-top:1rem;font-size:0.72rem;
  color:rgba(255,255,255,0.35);
}
.login-creds b{color:rgba(255,255,255,0.6)}
.login-creds-title{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,255,255,0.25);margin-bottom:0.5rem}

/* ═══════════════════════════
   APP SHELL
═══════════════════════════ */
#appScreen.active{display:flex;flex-direction:column}
.topbar{
  height:58px;background:var(--navy);display:flex;align-items:center;
  justify-content:space-between;padding:0 1.5rem;position:sticky;top:0;z-index:999;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.topbar-brand{font-family:'DM Serif Display',serif;font-size:1.1rem;color:#fff;letter-spacing:-0.01em}
.topbar-brand span{color:var(--sky)}
.topbar-right{display:flex;align-items:center;gap:1rem}
.topbar-user{display:flex;align-items:center;gap:0.6rem}
.topbar-avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;border:2px solid var(--blue2);background:var(--blue2);display:flex;align-items:center;justify-content:center;font-size:0.8rem;color:#fff;font-weight:700;overflow:hidden}
.topbar-avatar img{width:100%;height:100%;object-fit:cover}
.topbar-name{font-size:0.8rem;color:rgba(255,255,255,0.75);font-weight:500}
.topbar-role-pill{font-size:0.65rem;background:rgba(56,189,248,0.15);color:var(--sky);border:1px solid rgba(56,189,248,0.25);border-radius:100px;padding:0.15rem 0.6rem;font-weight:600;letter-spacing:0.05em}
.signout-btn{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:0.3rem 0.8rem;font-size:0.72rem;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:inherit}
.signout-btn:hover{background:rgba(255,255,255,0.12);color:#fff}

.app-body{display:flex;flex:1;min-height:calc(100vh - 58px)}
.sidebar{
  width:230px;background:#fff;border-right:1px solid var(--border);
  flex-shrink:0;position:sticky;top:58px;height:calc(100vh - 58px);
  overflow-y:auto;padding:1rem 0;
}
.sb-section{padding:0.5rem 1.1rem 0.25rem;font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--light)}
.sb-item{
  display:flex;align-items:center;gap:0.65rem;padding:0.6rem 1.1rem;
  font-size:0.8rem;color:var(--muted);cursor:pointer;transition:all 0.15s;
  border-left:3px solid transparent;font-weight:500;
}
.sb-item:hover{background:var(--bg);color:var(--navy)}
.sb-item.on{background:#EFF6FF;color:var(--blue2);border-left-color:var(--blue2);font-weight:700}
.sb-icon{font-size:1rem;width:20px;text-align:center}
.main{flex:1;padding:2rem;overflow-y:auto;min-width:0}
.page{display:none}
.page.on{display:block}

/* ═══ PAGE HEADERS ═══ */
.ph{margin-bottom:1.8rem}
.ph-title{font-family:'DM Serif Display',serif;font-size:1.6rem;color:var(--navy);line-height:1.2}
.ph-sub{font-size:0.85rem;color:var(--muted);margin-top:0.3rem}
.ph-row{display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;flex-wrap:wrap}

/* ═══ STAT CARDS ═══ */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:1rem;margin-bottom:1.8rem}
.stat-card{
  background:#fff;border:1px solid var(--border);border-radius:var(--r2);
  padding:1.2rem;transition:transform 0.2s,box-shadow 0.2s;
  animation:fadeUp 0.4s ease both;
}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.sc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.8rem}
.sc-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
.sc-trend{font-size:0.7rem;font-weight:700;padding:0.15rem 0.5rem;border-radius:100px}
.sc-num{font-size:1.9rem;font-weight:700;color:var(--navy);line-height:1;font-family:'DM Serif Display',serif}
.sc-label{font-size:0.74rem;color:var(--muted);margin-top:0.25rem;font-weight:500}

/* ═══ TABLES ═══ */
.card{background:#fff;border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-bottom:1.5rem}
.card-head{padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);gap:1rem;flex-wrap:wrap}
.card-title{font-size:0.92rem;font-weight:700;color:var(--navy)}
.card-body{padding:1.25rem}
table{width:100%;border-collapse:collapse;font-size:0.8rem}
th{background:var(--navy);color:rgba(255,255,255,0.85);padding:0.65rem 1rem;text-align:left;font-size:0.72rem;font-weight:600;letter-spacing:0.04em;text-transform:uppercase}
td{padding:0.7rem 1rem;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#F8FAFF}

/* ═══ BADGES ═══ */
.badge{display:inline-flex;align-items:center;gap:0.3rem;padding:0.2rem 0.65rem;border-radius:100px;font-size:0.68rem;font-weight:700;letter-spacing:0.02em}
.bg-green{background:#DCFCE7;color:#15803D}
.bg-blue{background:#DBEAFE;color:#1D4ED8}
.bg-amber{background:#FEF3C7;color:#B45309}
.bg-red{background:#FEE2E2;color:#B91C1C}
.bg-purple{background:#EDE9FE;color:#6D28D9}
.bg-teal{background:#CCFBF1;color:#0F766E}
.bg-gray{background:#F1F5F9;color:#475569}

/* ═══ BUTTONS ═══ */
.btn{padding:0.5rem 1.1rem;border-radius:8px;font-size:0.8rem;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all 0.2s;display:inline-flex;align-items:center;gap:0.4rem}
.btn-primary{background:var(--blue2);color:#fff}
.btn-primary:hover{background:#1D4ED8;box-shadow:0 4px 12px rgba(37,99,235,0.3)}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:#B91C1C}
.btn-ghost{background:var(--bg);color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--navy);border-color:var(--navy)}
.btn-sm{padding:0.3rem 0.7rem;font-size:0.72rem}
.btn-icon{width:30px;height:30px;padding:0;justify-content:center;border-radius:7px;font-size:0.9rem}

/* ═══ MODAL ═══ */
.overlay{display:none;position:fixed;inset:0;background:rgba(10,22,40,0.6);z-index:9000;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:20px;padding:2rem;width:100%;max-width:460px;box-shadow:0 30px 80px rgba(0,0,0,0.25);animation:fadeUp 0.3s cubic-bezier(0.22,1,0.36,1) both;max-height:90vh;overflow-y:auto}
.modal-title{font-family:'DM Serif Display',serif;font-size:1.3rem;color:var(--navy);margin-bottom:1.5rem}
.mfield{margin-bottom:1rem}
.mfield label{display:block;font-size:0.72rem;font-weight:700;color:var(--muted);margin-bottom:0.35rem;text-transform:uppercase;letter-spacing:0.05em}
.mfield input,.mfield select,.mfield textarea{width:100%;padding:0.65rem 0.9rem;border:1.5px solid var(--border);border-radius:9px;font-size:0.85rem;font-family:inherit;outline:none;transition:border-color 0.2s;background:#fff;color:var(--text)}
.mfield input:focus,.mfield select:focus,.mfield textarea:focus{border-color:var(--blue2);box-shadow:0 0 0 3px rgba(37,99,235,0.1)}
.mfield textarea{resize:vertical;min-height:80px}
.modal-btns{display:flex;gap:0.7rem;justify-content:flex-end;margin-top:1.5rem}

/* ═══ PROGRESS ═══ */
.prog-row{display:flex;align-items:center;gap:0.8rem;margin-bottom:0.7rem;font-size:0.8rem}
.prog-label{width:110px;color:var(--muted);flex-shrink:0;font-weight:500}
.prog-track{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width 0.6s ease}
.prog-pct{width:38px;text-align:right;font-weight:700;color:var(--navy);font-size:0.78rem}

/* ═══ ATTENDANCE GRID ═══ */
.att-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:0.75rem;margin-top:1rem}
.att-card{
  background:#fff;border:2px solid var(--border);border-radius:var(--r);
  padding:0.85rem;text-align:center;cursor:pointer;transition:all 0.2s;
}
.att-card:hover{border-color:var(--blue2);transform:translateY(-2px)}
.att-card.present{border-color:var(--green);background:#F0FDF4}
.att-card.absent{border-color:var(--red);background:#FEF2F2}
.att-card.late{border-color:var(--amber);background:#FFFBEB}
.att-avatar{width:44px;height:44px;border-radius:50%;margin:0 auto 0.5rem;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:1.1rem;overflow:hidden;border:2px solid var(--border)}
.att-avatar img{width:100%;height:100%;object-fit:cover}
.att-name{font-size:0.72rem;font-weight:700;color:var(--navy);line-height:1.3}
.att-status{font-size:0.65rem;margin-top:0.3rem;font-weight:700}
.att-card.present .att-status{color:var(--green)}
.att-card.absent .att-status{color:var(--red)}
.att-card.late .att-status{color:var(--amber)}
.att-toggle{display:flex;gap:4px;justify-content:center;margin-top:0.5rem}
.att-toggle button{font-size:0.6rem;padding:0.15rem 0.4rem;border-radius:4px;border:1px solid currentColor;background:transparent;cursor:pointer;font-weight:700;transition:all 0.15s}
.att-toggle .t-p{color:var(--green)}
.att-toggle .t-p:hover,.att-card.present .att-toggle .t-p{background:var(--green);color:#fff;border-color:var(--green)}
.att-toggle .t-a{color:var(--red)}
.att-toggle .t-a:hover,.att-card.absent .att-toggle .t-a{background:var(--red);color:#fff;border-color:var(--red)}
.att-toggle .t-l{color:var(--amber)}
.att-toggle .t-l:hover,.att-card.late .att-toggle .t-l{background:var(--amber);color:#fff;border-color:var(--amber)}

/* ═══ PROFILE CARD ═══ */
.profile-card{background:#fff;border:1px solid var(--border);border-radius:var(--r2);padding:1.5rem;display:flex;gap:1.5rem;align-items:flex-start;margin-bottom:1.5rem;flex-wrap:wrap}
.profile-pic-wrap{position:relative;flex-shrink:0}
.profile-pic{width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:2rem;overflow:hidden}
.profile-pic img{width:100%;height:100%;object-fit:cover}
.profile-pic-edit{
  position:absolute;bottom:2px;right:2px;width:26px;height:26px;
  background:var(--blue2);border-radius:50%;border:2px solid #fff;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  font-size:0.7rem;color:#fff;transition:background 0.2s;
}
.profile-pic-edit:hover{background:#1D4ED8}
.profile-info h2{font-size:1.2rem;font-weight:700;color:var(--navy)}
.profile-info .subtitle{font-size:0.8rem;color:var(--muted);margin-top:0.2rem}
.profile-tags{display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.7rem}

/* ═══ SMART REPORT ═══ */
.report-wrap{background:#fff;border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-bottom:1.5rem;box-shadow:var(--shadow)}
.report-banner{
  background:linear-gradient(135deg,var(--navy) 0%,#1B4FD8 60%,#0D9488 100%);
  padding:1.8rem 2rem;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:1rem;
}
.rb-left .school-name{font-family:'DM Serif Display',serif;font-size:1.3rem;color:#fff;letter-spacing:-0.01em}
.rb-left .term-info{font-size:0.78rem;color:rgba(255,255,255,0.6);margin-top:0.2rem;letter-spacing:0.05em;text-transform:uppercase}
.rb-right{text-align:right}
.rb-right .student-name{font-size:1rem;font-weight:700;color:#fff}
.rb-right .student-meta{font-size:0.75rem;color:rgba(255,255,255,0.6);margin-top:0.2rem}
.report-score-ring{display:flex;align-items:center;gap:1.5rem;padding:1.5rem 2rem;border-bottom:1px solid var(--border);flex-wrap:wrap}
.ring-wrap{position:relative;width:80px;height:80px;flex-shrink:0}
.ring-svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--border);stroke-width:7}
.ring-prog{fill:none;stroke-width:7;stroke-linecap:round;transition:stroke-dashoffset 1s ease}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-size:1.2rem;font-weight:700;color:var(--navy);line-height:1;font-family:'DM Serif Display',serif}
.ring-lbl{font-size:0.58rem;color:var(--muted);font-weight:600;margin-top:1px}
.score-summary h3{font-size:1rem;font-weight:700;color:var(--navy)}
.score-summary p{font-size:0.82rem;color:var(--muted);margin-top:0.2rem}
.rank-pill{display:inline-flex;align-items:center;gap:0.4rem;background:#EFF6FF;color:var(--blue2);border-radius:100px;padding:0.25rem 0.75rem;font-size:0.72rem;font-weight:700;margin-top:0.5rem}
.report-grades-table{padding:0 2rem 1rem}
.report-grades-table table{font-size:0.8rem}
.grade-bar-cell{min-width:120px}
.grade-bar{height:6px;border-radius:3px;background:var(--border);overflow:hidden;margin-top:3px}
.grade-bar-fill{height:100%;border-radius:3px}
.report-footer-section{padding:1rem 2rem;background:var(--bg);border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr 1fr;gap:1.5rem;font-size:0.78rem}
.rfs-block .rfs-label{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--light);margin-bottom:0.3rem;font-weight:700}
.rfs-block .rfs-value{color:var(--text);font-weight:600}
.rfs-block .rfs-comment{color:var(--muted);font-size:0.75rem;margin-top:0.2rem;line-height:1.5}
.report-actions{padding:1rem 2rem;border-top:1px solid var(--border);display:flex;gap:0.7rem;justify-content:flex-end}

/* ═══ ANNOUNCEMENT ═══ */
.announce-item{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:0.75rem;border-left:4px solid var(--blue2);transition:box-shadow 0.2s}
.announce-item:hover{box-shadow:var(--shadow)}
.announce-item.pinned{border-left-color:var(--amber);background:#FFFBEB}
.ann-title{font-size:0.9rem;font-weight:700;color:var(--navy)}
.ann-meta{font-size:0.72rem;color:var(--light);margin-top:0.2rem}
.ann-body{font-size:0.82rem;color:var(--muted);margin-top:0.5rem;line-height:1.6}

/* ═══ CALLOUT ═══ */
.callout{border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:1.2rem;display:flex;gap:0.8rem;font-size:0.83rem;border-left:4px solid;align-items:flex-start}
.c-tip{background:#F0FDF4;border-color:var(--green)}
.c-info{background:#EFF6FF;border-color:var(--blue2)}
.c-warn{background:#FFFBEB;border-color:var(--amber)}
.c-alert{background:#FEF2F2;border-color:var(--red)}

/* ═══ FORM GRID ═══ */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}

/* ═══ SEARCH / FILTER ROW ═══ */
.filter-row{display:flex;gap:0.75rem;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
.search-input{padding:0.5rem 0.9rem;border:1.5px solid var(--border);border-radius:8px;font-size:0.82rem;font-family:inherit;outline:none;transition:border-color 0.2s;background:#fff;min-width:200px}
.search-input:focus{border-color:var(--blue2)}
select.filter-sel{padding:0.5rem 0.9rem;border:1.5px solid var(--border);border-radius:8px;font-size:0.82rem;font-family:inherit;outline:none;background:#fff;cursor:pointer}

/* ═══ TIMETABLE ═══ */
.tt-grid{display:grid;grid-template-columns:80px repeat(5,1fr);gap:4px;font-size:0.75rem}
.tt-header{background:var(--navy);color:rgba(255,255,255,0.7);padding:0.5rem;border-radius:6px;text-align:center;font-weight:700;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.05em}
.tt-time{background:var(--bg);padding:0.5rem;border-radius:6px;text-align:center;color:var(--muted);font-weight:700;font-size:0.7rem;display:flex;align-items:center;justify-content:center}
.tt-cell{background:#fff;border:1px solid var(--border);padding:0.5rem;border-radius:6px;min-height:55px;display:flex;flex-direction:column;justify-content:center;transition:box-shadow 0.15s}
.tt-cell:hover{box-shadow:var(--shadow)}
.tt-cell .subj{font-weight:700;color:var(--navy);font-size:0.72rem}
.tt-cell .teacher{font-size:0.65rem;color:var(--muted);margin-top:2px}
.tt-cell .room{font-size:0.62rem;color:var(--light)}
.tt-cell.free{background:var(--bg);border-style:dashed}
.tt-break{background:linear-gradient(135deg,var(--teal),#0F766E);grid-column:2/7;border-radius:6px;padding:0.4rem;text-align:center;color:#fff;font-size:0.7rem;font-weight:700;letter-spacing:0.06em}

/* ═══ GRADE INPUT ═══ */
.grade-input-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:1rem;margin-bottom:0.5rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.gi-name{font-size:0.85rem;font-weight:600;color:var(--navy);min-width:160px;flex:1}
.gi-score{width:70px;padding:0.4rem 0.6rem;border:1.5px solid var(--border);border-radius:7px;font-size:0.85rem;font-family:'JetBrains Mono',monospace;text-align:center;outline:none;transition:border-color 0.2s}
.gi-score:focus{border-color:var(--blue2)}
.gi-grade-badge{min-width:30px;text-align:center;font-size:0.85rem;font-weight:700}

/* ═══ SCHOOL SWITCHER (superadmin only) ═══ */
.school-card{background:#fff;border:1px solid var(--border);border-radius:var(--r2);padding:1.25rem;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.school-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--blue2)}
.school-card:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
.school-card.selected{border-color:var(--blue2);box-shadow:0 0 0 3px rgba(37,99,235,0.15)}
.sc-school-name{font-size:0.95rem;font-weight:700;color:var(--navy)}
.sc-school-meta{font-size:0.75rem;color:var(--muted);margin-top:0.3rem}
.sc-school-stats{display:flex;gap:1rem;margin-top:0.8rem;flex-wrap:wrap}
.sc-school-stat{font-size:0.73rem;color:var(--muted)}
.sc-school-stat b{color:var(--navy)}

/* ═══ ANIMATIONS ═══ */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-in{animation:fadeUp 0.4s ease both}
.stagger-1{animation-delay:0.05s}
.stagger-2{animation-delay:0.1s}
.stagger-3{animation-delay:0.15s}
.stagger-4{animation-delay:0.2s}

/* ═══ DIVIDER ═══ */
.divider{height:1px;background:var(--border);margin:1.5rem 0}

/* ═══ EMPTY STATE ═══ */
.empty{text-align:center;padding:3rem;color:var(--light)}
.empty-icon{font-size:2.5rem;margin-bottom:0.75rem}
.empty-title{font-size:0.9rem;font-weight:700;color:var(--muted)}
.empty-sub{font-size:0.8rem;margin-top:0.3rem}

/* ═══ RESPONSIVE ═══ */
@media(max-width:820px){
  .sidebar{display:none}
  .g2,.g3{grid-template-columns:1fr}
  .main{padding:1.25rem}
  .report-footer-section{grid-template-columns:1fr}
  .tt-grid{grid-template-columns:60px repeat(5,1fr);font-size:0.65rem}
}
@media print{
  .topbar,.sidebar,.btn,.add-btn,.report-actions,.filter-row,
  .callout,.ph-row .btn,.modal-overlay{display:none!important}
  .report-banner{print-color-adjust:exact;-webkit-print-color-adjust:exact}
}

.hidden-file{display:none}

function buildTimetable(){
  const tt = TIMETABLE;
  let html = `
  <div class="ph"><div class="ph-title">Timetable</div><div class="ph-sub">Weekly class schedule — Term 2, 2026</div></div>
  <div class="card"><div class="card-body" style="overflow-x:auto">
  <div class="tt-grid">
    <div class="tt-header">Time</div>
    ${tt.days.map(d=>`<div class="tt-header">${d}</div>`).join('')}`;

  tt.times.forEach((time,ti)=>{
    if(time==='BREAK'){
      html+=`<div class="tt-time" style="background:transparent"></div><div class="tt-break">☕ BREAK — 10:00 to 11:15</div>`;
      return;
    }
    html+=`<div class="tt-time">${time}</div>`;
    tt.slots.forEach(day=>{
      const slot = day[ti];
      if(!slot||!slot.subj){
        html+=`<div class="tt-cell free"><span style="font-size:0.68rem;color:var(--light)">Free</span></div>`;
      } else {
        const colors=['#EFF6FF','#F0FDF4','#FDF4FF','#FFF7ED','#F0FDFA'];
        const bg=colors[ti%colors.length];
        html+=`<div class="tt-cell" style="background:${bg}"><div class="subj">${slot.subj}</div><div class="teacher">${slot.teacher}</div><div class="room">${slot.room}</div></div>`;
      }
    });
  });
  html+=`</div></div></div>`;
  return html;
}

}

function buildGradeEntry(){
  const myClass=currentUser.class;
  const students=USERS.student.filter(s=>s.class===myClass);
  const subject=currentUser.subject;
  const subjectKey=subject.split(' ')[0];
  return `
  <div class="ph ph-row">
    <div><div class="ph-title">Enter Grades</div><div class="ph-sub">${subject} · ${myClass}</div></div>
    <button class="btn btn-primary" onclick="saveGrades('${subjectKey}')">💾 Save All Grades</button>
  </div>
  <div class="callout c-info"><span>ℹ️</span><div>Enter scores out of 100. Grades are saved per subject. Students and parents <b>cannot</b> access individual reports — only Admins and Head Teachers can view Smart Reports.</div></div>
  <div id="gradeEntryList">
  ${students.map(s=>{
    const existing=(GRADES_DATA[s.id]||{})[subjectKey]||'';
    return `<div class="grade-input-card">
      <div class="gi-name">${s.name} <span style="font-size:0.72rem;color:var(--muted)">· ${s.class}</span></div>
      <div style="display:flex;align-items:center;gap:0.6rem">
        <label style="font-size:0.75rem;color:var(--muted);font-weight:600">Score /100</label>
        <input class="gi-score" id="grade_${s.id}" type="number" min="0" max="100" value="${existing}" placeholder="—" oninput="updateGradeBadge('${s.id}')"/>
        <span class="gi-grade-badge" id="gb_${s.id}">${gradeLetterFromScore(existing)}</span>
      </div>
    </div>`;
  }).join('')}
  </div>`;
}

function gradeLetterFromScore(v){
  const n=parseInt(v);
  if(isNaN(n)||n===0)return'—';
  if(n>=90)return'<span class="badge bg-green">A</span>';
  if(n>=80)return'<span class="badge bg-teal">B</span>';
  if(n>=70)return'<span class="badge bg-blue">C</span>';
  if(n>=60)return'<span class="badge bg-amber">D</span>';
  return'<span class="badge bg-red">F</span>';
}

function updateGradeBadge(id){
  const v=document.getElementById('grade_'+id).value;
  document.getElementById('gb_'+id).innerHTML=gradeLetterFromScore(v);
}

function saveGrades(subject){
  USERS.student.forEach(s=>{
    const el=document.getElementById('grade_'+s.id);
    if(!el)return;
    const v=parseInt(el.value);
    if(!GRADES_DATA[s.id])GRADES_DATA[s.id]={};
    if(!isNaN(v))GRADES_DATA[s.id][subject]=v;
  });
  alert('Grades saved successfully!');
}

/* ════════════════════════════════════════════════
   ATTENDANCE
════════════════════════════════════════════════ */
function buildAttendancePage(){
  const today=new Date().toISOString().split('T')[0];
  const isTeacher=currentUser.role==='teacher';
  const school=currentUser.school;
  const classFilter=isTeacher?currentUser.class:null;
  const students=USERS.student.filter(s=>(!school||s.school===school)&&(!classFilter||s.class===classFilter));
  if(!ATTENDANCE_DATA[today])ATTENDANCE_DATA[today]={};
  students.forEach(s=>{if(!ATTENDANCE_DATA[today][s.id])ATTENDANCE_DATA[today][s.id]='present';});

  return `
  <div class="ph ph-row">
    <div><div class="ph-title">Attendance</div><div class="ph-sub">Mark attendance for today — ${new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div></div>
    <button class="btn btn-primary" onclick="saveAttendance()">💾 Save Attendance</button>
  </div>
  <div style="display:flex;gap:1rem;margin-bottom:1rem;flex-wrap:wrap">
    <span class="badge bg-green">✅ Present</span>
    <span class="badge bg-red">❌ Absent</span>
    <span class="badge bg-amber">⏱ Late</span>
    <span style="font-size:0.78rem;color:var(--muted);align-self:center">Click a card to toggle status</span>
  </div>
  <div class="att-grid" id="attGrid">
  ${students.map(s=>{
    const status=ATTENDANCE_DATA[today][s.id]||'present';
    const av=s.pic?`<div class="att-avatar"><img src="${s.pic}"></div>`:`<div class="att-avatar">${s.name[0]}</div>`;
    return `<div class="att-card ${status}" id="att_${s.id}" onclick="">
      ${av}
      <div class="att-name">${s.name}</div>
      <div class="att-status" id="atts_${s.id}">${statusLabel(status)}</div>
      <div class="att-toggle">
        <button class="t-p" onclick="setAtt('${s.id}','present',event)">P</button>
        <button class="t-l" onclick="setAtt('${s.id}','late',event)">L</button>
        <button class="t-a" onclick="setAtt('${s.id}','absent',event)">A</button>
      </div>
    </div>`;
  }).join('')}
  </div>`;
}

function statusLabel(s){return s==='present'?'✅ Present':s==='absent'?'❌ Absent':'⏱ Late';}

function setAtt(id,status,e){
  e.stopPropagation();
  const today=new Date().toISOString().split('T')[0];
  if(!ATTENDANCE_DATA[today])ATTENDANCE_DATA[today]={};
  ATTENDANCE_DATA[today][id]=status;
  const card=document.getElementById('att_'+id);
  card.className='att-card '+status;
  document.getElementById('atts_'+id).textContent=statusLabel(status);
}

function saveAttendance(){
  const today=new Date().toISOString().split('T')[0];
  const data=ATTENDANCE_DATA[today]||{};
  const present=Object.values(data).filter(v=>v==='present').length;
  const absent=Object.values(data).filter(v=>v==='absent').length;
  const late=Object.values(data).filter(v=>v==='late').length;
  alert(`Attendance saved!\n✅ Present: ${present}\n❌ Absent: ${absent}\n⏱ Late: ${late}`);
}

function generateReport(){
  const sid=document.getElementById('reportStudentSel').value;
  const term=document.getElementById('reportTermSel').value;
  if(!sid){alert('Please select a student.');return;}
  const student=USERS.student.find(s=>s.id===sid);
  const grades=GRADES_DATA[sid]||{};
  const subjects=Object.keys(grades).length?Object.keys(grades):['Math','Science','English','History','Geography','Research'];
  const vals=subjects.map(s=>grades[s]||0);
  const avg=Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
  const school=SCHOOLS.find(s=>s.id===student.school)||{name:'EduBuild Academy'};

  const gradeColors={A:'#16A34A',B:'#0D9488',C:'#1B4FD8',D:'#D97706',F:'#DC2626'};
  const letter=gradeLetterText(avg);
  const color=gradeColors[letter];
  const circum=2*Math.PI*33;
  const offset=circum*(1-avg/100);

  const comments={
    A:'Exceptional performance. Demonstrates outstanding mastery across all areas.',
    B:'Strong performance. Shows solid understanding with room for further excellence.',
    C:'Satisfactory performance. Core concepts understood; targeted revision recommended.',
    D:'Below expectations. Additional support and focused study required.',
    F:'Significant improvement needed. Immediate intervention and support plan advised.',
  };

  const html=`
  <div class="report-wrap">
    <div class="report-banner">
      <div class="rb-left">
        <div class="school-name">🏛️ ${school.name}</div>
        <div class="term-info">Academic Report · ${term}</div>
      </div>
      <div class="rb-right">
        <div class="student-name">${student.name}</div>
        <div class="student-meta">Class: ${student.class} · ID: ${student.id.toUpperCase()}</div>
      </div>
    </div>

    <div class="report-score-ring">
      <div class="ring-wrap">
        <svg class="ring-svg" width="80" height="80" viewBox="0 0 80 80">
          <circle class="ring-bg" cx="40" cy="40" r="33"/>
          <circle class="ring-prog" cx="40" cy="40" r="33"
            stroke="${color}" stroke-dasharray="${circum}" stroke-dashoffset="${offset}"/>
        </svg>
        <div class="ring-center">
          <div class="ring-pct" style="color:${color}">${avg}%</div>
          <div class="ring-lbl">Overall</div>
        </div>
      </div>
      <div class="score-summary">
        <h3>${student.name}</h3>
        <p>${student.class} · ${term}</p>
        <div class="rank-pill">🏆 Grade ${letter} · ${comments[letter].split('.')[0]}</div>
      </div>
    </div>

    <div class="report-grades-table">
      <table>
        <thead><tr><th>Subject</th><th>Score</th><th>Grade</th><th>Performance</th></tr></thead>
        <tbody>
        ${subjects.map(sub=>{
          const v=grades[sub]||0;
          const l=gradeLetterText(v);
          const c2=gradeColors[l];
          return `<tr>
            <td style="font-weight:600">${sub}</td>
            <td style="font-family:'JetBrains Mono',monospace;font-weight:700;color:${c2}">${v}</td>
            <td><span class="badge" style="background:${c2}20;color:${c2}">${l}</span></td>
            <td class="grade-bar-cell">
              <div style="font-size:0.68rem;color:var(--muted)">${v>=80?'Excellent':v>=70?'Good':v>=60?'Adequate':'Needs Work'}</div>
              <div class="grade-bar"><div class="grade-bar-fill" style="width:${v}%;background:${c2}"></div></div>
            </td>
          </tr>`;
        }).join('')}
        </tbody>
      </table>
    </div>

    <div class="report-footer-section">
      <div class="rfs-block">
        <div class="rfs-label">Class Teacher Remarks</div>
        <div class="rfs-value">Mrs. Amara Patel</div>
        <div class="rfs-comment">${comments[letter]}</div>
      </div>
      <div class="rfs-block">
        <div class="rfs-label">Head Teacher Sign-off</div>
        <div class="rfs-value">Dr. Sarah Okonkwo</div>
        <div class="rfs-comment">Report reviewed and approved. ${letter==='A'||letter==='B'?'Continue the excellent progress.':'We encourage focused effort next term.'}</div>
      </div>
      <div class="rfs-block">
        <div class="rfs-label">Attendance This Term</div>
        <div class="rfs-value">42 / 45 days</div>
        <div class="rfs-comment">Attendance rate: <b>93%</b>. <span style="color:var(--green)">✅ Good</span></div>
      </div>
    </div>

    <div class="report-actions">
      <button class="btn btn-ghost" onclick="document.getElementById('reportOutput').innerHTML=''">✕ Close</button>
      <button class="btn btn-primary" onclick="window.print()">🖨️ Print Report</button>
    </div>
  </div>`;

  document.getElementById('reportOutput').innerHTML=html;
  document.getElementById('reportOutput').scrollIntoView({behavior:'smooth',block:'start'});
}

════════════════════════════════════════════════ */
function openPicModal(id, type){
  picTargetId = {id, type};
  document.getElementById('picFileInput').click();
}

function handlePicUpload(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    const dataUrl = e.target.result;
    const {id, type} = picTargetId;
    if(type==='self'){
      currentUser.pic = dataUrl;
      const av = document.getElementById('topbarAvatar');
      av.innerHTML=`<img src="${dataUrl}">`;
    } else if(type==='teacher'){
      const t = USERS.teacher.find(x=>x.id===id);
      if(t) t.pic = dataUrl;
    } else if(type==='student'){
      const s = USERS.student.find(x=>x.id===id);
      if(s) s.pic = dataUrl;
    }
    event.target.value='';
    buildMainPages();
    activatePage(document.querySelector('.sb-item.on')?.id?.replace('sb-','') || 'dashboard');
  };
  reader.readAsDataURL(file);
}
