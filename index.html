<script>
/* =========================================
   GLOBAL DATA
=========================================*/
let currentRole = "superadmin";
let isLoggedIn = false;

let students = [];
let marks = [];
let attendance = [];
let timetable = [];
let assignments = [];
let messages = [];
let fees = [];
let exams = [];
let schools = [];

/* =========================================
   LOAD & SAVE LOCAL STORAGE
=========================================*/
function loadData() {
  students = JSON.parse(localStorage.getItem("students")) || [];
  marks = JSON.parse(localStorage.getItem("marks")) || [];
  attendance = JSON.parse(localStorage.getItem("attendance")) || [];
  timetable = JSON.parse(localStorage.getItem("timetable")) || [];
  assignments = JSON.parse(localStorage.getItem("assignments")) || [];
  messages = JSON.parse(localStorage.getItem("messages")) || [];
  fees = JSON.parse(localStorage.getItem("fees")) || [];
  exams = JSON.parse(localStorage.getItem("exams")) || [];
  schools = JSON.parse(localStorage.getItem("schools")) || [];

  renderStudents();
}

function saveData() {
  localStorage.setItem("students", JSON.stringify(students));
  localStorage.setItem("marks", JSON.stringify(marks));
  localStorage.setItem("attendance", JSON.stringify(attendance));
  localStorage.setItem("timetable", JSON.stringify(timetable));
  localStorage.setItem("assignments", JSON.stringify(assignments));
  localStorage.setItem("messages", JSON.stringify(messages));
  localStorage.setItem("fees", JSON.stringify(fees));
  localStorage.setItem("exams", JSON.stringify(exams));
  localStorage.setItem("schools", JSON.stringify(schools));
}

window.onload = loadData;

/* =========================================
   LOGIN SYSTEM
=========================================*/
const validUsers = {
  superadmin: { user: "Michel@2005", pass: "Michel@4321" },
  teacher: { user: "teacher", pass: "teacher123" },
  student: { user: "student", pass: "student123" },
  parent: { user: "parent", pass: "parent123" }
};

function doLogin() {
  const u = document.getElementById("loginUser").value;
  const p = document.getElementById("loginPass").value;

  const auth = validUsers[currentRole];

  if (u === auth.user && p === auth.pass) {
    isLoggedIn = true;
    document.getElementById("loginScreen").classList.remove("active");
    document.getElementById("adminScreen").classList.add("active");
  } else {
    document.getElementById("loginError").style.display = "block";
  }
}

function signOut() {
  isLoggedIn = false;
  document.getElementById("adminScreen").classList.remove("active");
  document.getElementById("loginScreen").classList.add("active");
}

/* =========================================
   STUDENT DATABASE + PHOTO
=========================================*/
function addStudent() {
  const name = document.getElementById("studentName").value;
  const className = document.getElementById("studentClass").value;
  const photoInput = document.getElementById("studentPhoto");

  const reader = new FileReader();
  reader.onload = function(e) {
    const id = "ST" + (students.length + 1);

    students.push({
      id,
      name,
      class: className,
      photo: e.target.result
    });

    saveData();
    renderStudents();
  };

  if (photoInput.files[0]) {
    reader.readAsDataURL(photoInput.files[0]);
  }
}

function renderStudents() {
  const table = document.getElementById("studentTable");
  if (!table) return;

  table.innerHTML = "";

  students.forEach(st => {
    table.innerHTML += `
      <tr>
        <td>${st.id}</td>
        <td><img src="${st.photo}" width="40"></td>
        <td>${st.name}</td>
        <td>${st.class}</td>
      </tr>
    `;
  });
}

/* =========================================
   MARKS + AVERAGE
=========================================*/
function addMarks() {
  const studentId = document.getElementById("markStudent").value;
  const subject = document.getElementById("markSubject").value;
  const score = parseFloat(document.getElementById("markScore").value);

  marks.push({ studentId, subject, score });
  saveData();
}

function calculateAverage(studentId) {
  const studentMarks = marks.filter(m => m.studentId === studentId);
  if (studentMarks.length === 0) return 0;

  let total = 0;
  studentMarks.forEach(m => total += m.score);

  return (total / studentMarks.length).toFixed(2);
}

/* =========================================
   CLASS RANKING
=========================================*/
function calculateRanking(className) {
  const classStudents = students.filter(s => s.class === className);
  let ranking = [];

  classStudents.forEach(st => {
    ranking.push({
      name: st.name,
      avg: parseFloat(calculateAverage(st.id))
    });
  });

  ranking.sort((a, b) => b.avg - a.avg);
  return ranking;
}

/* =========================================
   ATTENDANCE
=========================================*/
function markAttendance() {
  const studentId = document.getElementById("attStudent").value;
  const status = document.getElementById("attStatus").value;

  attendance.push({
    studentId,
    status,
    date: new Date().toLocaleDateString()
  });

  saveData();
}

/* =========================================
   REPORT + AI COMMENT
=========================================*/
function aiComment(avg) {
  if (avg >= 85) return "Excellent performance. Keep it up!";
  if (avg >= 70) return "Very good performance.";
  if (avg >= 50) return "Good effort. Needs improvement.";
  return "Needs serious improvement.";
}

function generateReport() {
  const studentId = document.getElementById("reportStudent").value;
  const student = students.find(s => s.id === studentId);
  const avg = calculateAverage(studentId);
  const comment = aiComment(avg);

  document.getElementById("reportCard").innerHTML = `
    <h2>EduBuild Smart Report</h2>
    <p>Name: ${student.name}</p>
    <p>Class: ${student.class}</p>
    <p>Average: ${avg}%</p>
    <p>Comment: ${comment}</p>
  `;
}

function exportPDF() {
  const content = document.getElementById("reportCard").innerHTML;
  const win = window.open("", "", "width=800,height=600");
  win.document.write(content);
  win.print();
}

/* =========================================
   TIMETABLE
=========================================*/
function addTimetable() {
  const className = document.getElementById("ttClass").value;
  const subject = document.getElementById("ttSubject").value;
  const day = document.getElementById("ttDay").value;

  timetable.push({ className, subject, day });
  saveData();
}

/* =========================================
   ASSIGNMENTS
=========================================*/
function addAssignment() {
  const title = document.getElementById("assTitle").value;
  const className = document.getElementById("assClass").value;

  assignments.push({ title, className });
  saveData();
}

/* =========================================
   MESSAGING
=========================================*/
function sendMessage() {
  const to = document.getElementById("msgTo").value;
  const text = document.getElementById("msgText").value;

  messages.push({
    from: currentRole,
    to,
    text,
    date: new Date().toLocaleString()
  });

  saveData();
}

/* =========================================
   FEES
=========================================*/
function addFee() {
  const studentId = document.getElementById("feeStudent").value;
  const amount = document.getElementById("feeAmount").value;

  fees.push({ studentId, amount });
  saveData();
}

/* =========================================
   ANALYTICS
=========================================*/
function schoolAnalytics() {
  const totalStudents = students.length;
  const totalFees = fees.reduce((sum, f) => sum + Number(f.amount), 0);

  document.getElementById("analytics").innerHTML = `
    <h3>Total Students: ${totalStudents}</h3>
    <h3>Total Fees: ${totalFees}</h3>
  `;
}

/* =========================================
   ONLINE EXAMS
=========================================*/
function addExam() {
  const subject = document.getElementById("examSubject").value;
  const question = document.getElementById("examQuestion").value;
  const answer = document.getElementById("examAnswer").value;

  exams.push({ subject, question, answer });
  saveData();
}

function submitExam() {
  const studentAnswer = document.getElementById("studentAnswer").value;
  const correctAnswer = exams[0].answer;

  if (studentAnswer === correctAnswer) {
    alert("Correct!");
  } else {
    alert("Wrong answer");
  }
}

/* =========================================
   MULTI SCHOOL
=========================================*/
function addSchool() {
  const name = document.getElementById("schoolName").value;
  const location = document.getElementById("schoolLocation").value;

  schools.push({ name, location });
  saveData();
}

/* =========================================
   PAGE NAVIGATION
=========================================*/
function showPage(page) {
  document.querySelectorAll(".admin-page").forEach(pg => {
    pg.classList.remove("on");
  });

  const target = document.getElementById("page-" + page);
  if (target) target.classList.add("on");
}
</script>
