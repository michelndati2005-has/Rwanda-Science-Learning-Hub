<html lang="en" data-theme="light" data-lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EduBuild — International School Platform</title>

<!-- ═══════════════════════════════════════════
     ARCHITECTURE NOTE FOR DEVELOPERS
     
     This file is structured as modular sections:
     1. CSS VARIABLES & THEME  (line ~50)
     2. BASE STYLES            (line ~150)
     3. COMPONENT STYLES       (line ~300)
     4. PAGE-SPECIFIC STYLES   (line ~600)
     
     JAVASCRIPT MODULES (each section clearly labelled):
     A. CONFIG & CONSTANTS     
     B. TRANSLATION ENGINE     
     C. THEME ENGINE           
     D. AUTH ENGINE            
     E. DATA LAYER             
     F. UI COMPONENTS          
     G. PAGE BUILDERS          
     H. FEATURE MODULES        
        - Attendance
        - Grades
        - Reports
        - Announcements
        - Timetable
        - Profile / Photo
     I. ROUTER                 
     J. INIT                   
     
     To add a new feature:
     1. Add translations to TRANSLATIONS object (section B)
     2. Add sidebar item in getSidebarItems() (section I)
     3. Add a buildPageXxx() function (section G)
     4. Register it in buildMainPages() (section I)
═══════════════════════════════════════════ -->

<style>
/* ═══════════════════════════════════════════
   SECTION 1: CSS VARIABLES & THEME SYSTEM
═══════════════════════════════════════════ */
:root {
  /* Brand */
  --brand-primary: #1a56db;
  --brand-secondary: #0e9f6e;
  --brand-accent: #e3a008;

  /* Light Theme */
  --bg-base: #f0f4fb;
  --bg-surface: #ffffff;
  --bg-surface2: #f8faff;
  --bg-nav: #0f172a;
  --bg-sidebar: #ffffff;
  --bg-input: #ffffff;

  --text-primary: #0f172a;
  --text-secondary: #475569;
  --text-muted: #94a3b8;
  --text-nav: rgba(255,255,255,0.85);
  --text-inverse: #ffffff;

  --border-color: #e2e8f4;
  --border-focus: #1a56db;

  --shadow-sm: 0 1px 4px rgba(15,23,42,0.06);
  --shadow-md: 0 4px 20px rgba(15,23,42,0.09);
  --shadow-lg: 0 12px 40px rgba(15,23,42,0.14);
  --shadow-xl: 0 24px 64px rgba(15,23,42,0.20);

  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 18px;
  --radius-xl: 24px;
  --radius-full: 9999px;

  /* Semantic colors */
  --color-success: #16a34a;
  --color-success-bg: #dcfce7;
  --color-danger: #dc2626;
  --color-danger-bg: #fee2e2;
  --color-warning: #d97706;
  --color-warning-bg: #fef3c7;
  --color-info: #1d4ed8;
  --color-info-bg: #dbeafe;
  --color-purple: #7c3aed;
  --color-purple-bg: #ede9fe;
  --color-teal: #0f766e;
  --color-teal-bg: #ccfbf1;

  /* Transitions */
  --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
  --transition-slow: 0.4s cubic-bezier(0.4,0,0.2,1);
}

[data-theme="dark"] {
  --bg-base: #0c1117;
  --bg-surface: #161b25;
  --bg-surface2: #1e2535;
  --bg-nav: #080d14;
  --bg-sidebar: #111827;
  --bg-input: #1e2535;

  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #475569;
  --text-nav: rgba(255,255,255,0.8);
  --text-inverse: #0f172a;

  --border-color: rgba(255,255,255,0.08);
  --border-focus: #3b82f6;

  --shadow-sm: 0 1px 4px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.4);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.5);

  --color-success-bg: rgba(22,163,74,0.15);
  --color-danger-bg: rgba(220,38,38,0.15);
  --color-warning-bg: rgba(217,119,6,0.15);
  --color-info-bg: rgba(29,78,216,0.15);
  --color-purple-bg: rgba(124,58,237,0.15);
  --color-teal-bg: rgba(15,118,110,0.15);
}

/* ═══════════════════════════════════════════
   SECTION 2: BASE STYLES
═══════════════════════════════════════════ */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body {
  font-family:'DM Sans',sans-serif;
  background:var(--bg-base);
  color:var(--text-primary);
  line-height:1.6;
  overflow-x:hidden;
  transition:background var(--transition-slow), color var(--transition-slow);
}
h1,h2,h3,.serif { font-family:'Fraunces',serif; }
.mono { font-family:'JetBrains Mono',monospace; }
a { color:var(--brand-primary); text-decoration:none; }
input,select,textarea,button { font-family:inherit; }

/* Screens */
.screen { display:none; min-height:100vh; }
.screen.active { display:block; }
#appScreen.active { display:flex; flex-direction:column; }

/* ═══════════════════════════════════════════
   SECTION 3: LOGIN SCREEN
═══════════════════════════════════════════ */
#loginScreen {
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  padding:2rem; position:relative; overflow:hidden;
  background:var(--bg-nav);
}
#loginScreen.active { display:flex; }

.login-bg {
  position:absolute; inset:0; pointer-events:none; overflow:hidden;
}
.login-orb {
  position:absolute; border-radius:50%;
  filter:blur(100px); opacity:0.12;
  animation:orbFloat 8s ease-in-out infinite;
}
.login-orb:nth-child(1){width:600px;height:600px;background:#1a56db;top:-200px;right:-100px;animation-delay:0s}
.login-orb:nth-child(2){width:400px;height:400px;background:#0e9f6e;bottom:-150px;left:-100px;animation-delay:-3s}
.login-orb:nth-child(3){width:300px;height:300px;background:#e3a008;top:50%;left:35%;animation-delay:-6s}

@keyframes orbFloat {
  0%,100%{transform:translate(0,0) scale(1)}
  33%{transform:translate(30px,-20px) scale(1.05)}
  66%{transform:translate(-20px,30px) scale(0.95)}
}

/* Grid pattern overlay */
.login-grid {
  position:absolute; inset:0;
  background-image:linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);
  background-size:48px 48px;
}

.login-wrap {
  position:relative; z-index:10;
  display:flex; flex-direction:column; align-items:center; gap:2rem;
  width:100%; max-width:440px;
}

.login-brand {
  text-align:center;
}
.login-logo-text {
  font-family:'Fraunces',serif;
  font-size:2.4rem; font-weight:700; color:#fff; letter-spacing:-0.03em;
}
.login-logo-text span { color:#60a5fa; }
.login-tagline {
  font-size:0.72rem; color:rgba(255,255,255,0.35);
  letter-spacing:0.2em; text-transform:uppercase; margin-top:0.4rem;
}

.login-card {
  width:100%;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.10);
  backdrop-filter:blur(24px);
  border-radius:var(--radius-xl);
  padding:2.5rem 2rem;
  box-shadow:var(--shadow-xl);
  animation:slideUp 0.7s cubic-bezier(0.22,1,0.36,1) both;
}

@keyframes slideUp {
  from{opacity:0;transform:translateY(32px) scale(0.97)}
  to{opacity:1;transform:none}
}

/* Login tabs — role selector */
.role-selector {
  display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:1.8rem;
}
.role-tab {
  padding:0.75rem 0.5rem; border-radius:var(--radius-sm);
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.04);
  color:rgba(255,255,255,0.45);
  cursor:pointer; transition:all var(--transition);
  text-align:center; font-size:0.78rem; font-weight:600;
  letter-spacing:0.02em;
}
.role-tab:hover { background:rgba(255,255,255,0.09); color:rgba(255,255,255,0.8); }
.role-tab.active {
  background:rgba(26,86,219,0.35);
  border-color:rgba(96,165,250,0.5);
  color:#fff;
  box-shadow:0 0 0 2px rgba(26,86,219,0.25), inset 0 1px 0 rgba(255,255,255,0.1);
}
.role-tab-icon { font-size:1.3rem; display:block; margin-bottom:0.25rem; }

/* Login form fields */
.lf-group { margin-bottom:1rem; }
.lf-label {
  display:block; font-size:0.7rem; font-weight:600;
  color:rgba(255,255,255,0.4); margin-bottom:0.4rem;
  text-transform:uppercase; letter-spacing:0.1em;
}
.lf-input {
  width:100%; padding:0.75rem 1rem;
  border:1px solid rgba(255,255,255,0.12);
  border-radius:var(--radius-sm);
  background:rgba(255,255,255,0.07); color:#fff;
  font-size:0.9rem; outline:none;
  transition:border-color var(--transition), background var(--transition);
}
.lf-input::placeholder { color:rgba(255,255,255,0.2); }
.lf-input:focus { border-color:rgba(96,165,250,0.6); background:rgba(26,86,219,0.15); }

.login-submit {
  width:100%; padding:0.9rem;
  background:linear-gradient(135deg,#1a56db,#1d4ed8);
  color:#fff; border:none; border-radius:var(--radius-sm);
  font-size:0.9rem; font-weight:700; cursor:pointer;
  transition:all var(--transition); margin-top:0.5rem;
  letter-spacing:0.03em;
  box-shadow:0 4px 16px rgba(26,86,219,0.4);
}
.login-submit:hover { transform:translateY(-1px); box-shadow:0 8px 24px rgba(26,86,219,0.5); }
.login-submit:active { transform:none; }

.login-err {
  background:rgba(220,38,38,0.15); color:#fca5a5;
  border:1px solid rgba(220,38,38,0.3); border-radius:var(--radius-sm);
  padding:0.6rem 0.9rem; font-size:0.8rem; font-weight:600;
  text-align:center; margin-top:0.75rem; display:none;
}

/* Register link */
.login-register-link {
  text-align:center; font-size:0.78rem; color:rgba(255,255,255,0.35);
  margin-top:1rem;
}
.login-register-link a { color:rgba(96,165,250,0.8); cursor:pointer; }
.login-register-link a:hover { color:#60a5fa; }

/* ── REGISTER FORM ── */
.register-card {
  width:100%; max-width:440px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.10);
  backdrop-filter:blur(24px);
  border-radius:var(--radius-xl);
  padding:2.5rem 2rem;
  box-shadow:var(--shadow-xl);
  animation:slideUp 0.5s cubic-bezier(0.22,1,0.36,1) both;
  display:none;
}
.register-card.active { display:block; }
.login-card.hidden { display:none; }

/* ═══════════════════════════════════════════
   SECTION 4: TOP NAV & SIDEBAR
═══════════════════════════════════════════ */
.topbar {
  height:60px; background:var(--bg-nav);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 1.5rem; position:sticky; top:0; z-index:999;
  border-bottom:1px solid rgba(255,255,255,0.06);
  transition:background var(--transition-slow);
}
.topbar-left { display:flex; align-items:center; gap:1rem; }
.topbar-brand {
  font-family:'Fraunces',serif;
  font-size:1.15rem; color:#fff; letter-spacing:-0.02em;
}
.topbar-brand span { color:#60a5fa; }

/* Language switcher */
.lang-switcher {
  display:flex; gap:4px;
  background:rgba(255,255,255,0.06);
  border-radius:var(--radius-sm); padding:3px;
}
.lang-btn {
  padding:0.25rem 0.55rem; border-radius:5px;
  font-size:0.68rem; font-weight:700;
  color:rgba(255,255,255,0.4);
  border:none; background:transparent; cursor:pointer;
  transition:all var(--transition); letter-spacing:0.05em;
}
.lang-btn.active { background:rgba(255,255,255,0.15); color:#fff; }
.lang-btn:hover { color:#fff; }

/* Theme toggle */
.theme-toggle {
  width:36px; height:36px; border-radius:var(--radius-sm);
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.6); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-size:1rem; transition:all var(--transition);
}
.theme-toggle:hover { background:rgba(255,255,255,0.13); color:#fff; }

.topbar-right { display:flex; align-items:center; gap:0.75rem; }
.topbar-avatar-wrap { display:flex; align-items:center; gap:0.6rem; }
.topbar-avatar {
  width:34px; height:34px; border-radius:50%;
  background:var(--brand-primary); color:#fff;
  display:flex; align-items:center; justify-content:center;
  font-size:0.85rem; font-weight:700; overflow:hidden;
  border:2px solid rgba(96,165,250,0.4);
}
.topbar-avatar img { width:100%; height:100%; object-fit:cover; }
.topbar-name { font-size:0.8rem; color:rgba(255,255,255,0.75); font-weight:500; }
.topbar-role-badge {
  font-size:0.62rem; background:rgba(96,165,250,0.15);
  color:#93c5fd; border:1px solid rgba(96,165,250,0.25);
  border-radius:var(--radius-full); padding:0.15rem 0.6rem; font-weight:700;
}
.signout-btn {
  background:rgba(255,255,255,0.07); color:rgba(255,255,255,0.55);
  border:1px solid rgba(255,255,255,0.1); border-radius:var(--radius-sm);
  padding:0.3rem 0.85rem; font-size:0.72rem; font-weight:600; cursor:pointer;
  transition:all var(--transition);
}
.signout-btn:hover { background:rgba(255,255,255,0.13); color:#fff; }

/* ── SIDEBAR ── */
.app-body { display:flex; flex:1; min-height:calc(100vh - 60px); }
.sidebar {
  width:235px; background:var(--bg-sidebar); flex-shrink:0;
  position:sticky; top:60px; height:calc(100vh - 60px); overflow-y:auto;
  border-right:1px solid var(--border-color);
  padding:1rem 0;
  transition:background var(--transition-slow), border-color var(--transition-slow);
}
.sb-section {
  padding:0.6rem 1.1rem 0.25rem;
  font-size:0.6rem; font-weight:700; text-transform:uppercase;
  letter-spacing:0.14em; color:var(--text-muted);
}
.sb-item {
  display:flex; align-items:center; gap:0.65rem;
  padding:0.62rem 1.1rem; font-size:0.8rem; color:var(--text-secondary);
  cursor:pointer; transition:all var(--transition);
  border-left:3px solid transparent; font-weight:500;
  user-select:none;
}
.sb-item:hover { background:var(--bg-base); color:var(--text-primary); }
.sb-item.on {
  background:rgba(26,86,219,0.08); color:var(--brand-primary);
  border-left-color:var(--brand-primary); font-weight:700;
}
[data-theme="dark"] .sb-item.on { background:rgba(26,86,219,0.15); }
.sb-icon { font-size:1rem; width:20px; text-align:center; }
.sb-badge {
  margin-left:auto; font-size:0.62rem; background:var(--color-danger-bg);
  color:var(--color-danger); border-radius:var(--radius-full);
  padding:0.1rem 0.45rem; font-weight:700;
}

/* ── MAIN CONTENT ── */
.main { flex:1; padding:2rem; overflow-y:auto; min-width:0; }
.page { display:none; }
.page.on { display:block; }

/* ═══════════════════════════════════════════
   SECTION 5: SHARED COMPONENTS
═══════════════════════════════════════════ */

/* Page header */
.ph { margin-bottom:2rem; }
.ph-row { display:flex; align-items:flex-end; justify-content:space-between; gap:1rem; flex-wrap:wrap; }
.ph-title {
  font-family:'Fraunces',serif; font-size:1.7rem; color:var(--text-primary);
  line-height:1.2; letter-spacing:-0.02em;
}
.ph-sub { font-size:0.85rem; color:var(--text-secondary); margin-top:0.3rem; }

/* Cards */
.card {
  background:var(--bg-surface); border:1px solid var(--border-color);
  border-radius:var(--radius-lg); overflow:hidden; margin-bottom:1.5rem;
  transition:background var(--transition-slow), border-color var(--transition-slow);
  box-shadow:var(--shadow-sm);
}
.card-head {
  padding:1rem 1.25rem; display:flex; align-items:center;
  justify-content:space-between; border-bottom:1px solid var(--border-color);
  gap:1rem; flex-wrap:wrap;
}
.card-title { font-size:0.92rem; font-weight:700; color:var(--text-primary); }
.card-body { padding:1.25rem; }

/* Stat cards */
.stat-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(155px,1fr)); gap:1rem; margin-bottom:1.8rem; }
.stat-card {
  background:var(--bg-surface); border:1px solid var(--border-color);
  border-radius:var(--radius-lg); padding:1.2rem;
  transition:all var(--transition); cursor:default; box-shadow:var(--shadow-sm);
}
.stat-card:hover { transform:translateY(-2px); box-shadow:var(--shadow-md); }
.sc-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:0.8rem; }
.sc-icon { width:42px; height:42px; border-radius:var(--radius-sm); display:flex; align-items:center; justify-content:center; font-size:1.15rem; }
.sc-num { font-family:'Fraunces',serif; font-size:2rem; font-weight:700; color:var(--text-primary); line-height:1; }
.sc-label { font-size:0.75rem; color:var(--text-secondary); margin-top:0.25rem; font-weight:500; }

/* Badges */
.badge {
  display:inline-flex; align-items:center; gap:0.25rem;
  padding:0.2rem 0.65rem; border-radius:var(--radius-full);
  font-size:0.68rem; font-weight:700; letter-spacing:0.02em; white-space:nowrap;
}
.badge-success { background:var(--color-success-bg); color:var(--color-success); }
.badge-danger  { background:var(--color-danger-bg);  color:var(--color-danger); }
.badge-warning { background:var(--color-warning-bg); color:var(--color-warning); }
.badge-info    { background:var(--color-info-bg);    color:var(--color-info); }
.badge-purple  { background:var(--color-purple-bg);  color:var(--color-purple); }
.badge-teal    { background:var(--color-teal-bg);    color:var(--color-teal); }
.badge-muted   { background:var(--bg-base);          color:var(--text-secondary); border:1px solid var(--border-color); }

/* Buttons */
.btn {
  padding:0.55rem 1.15rem; border-radius:var(--radius-sm);
  font-size:0.8rem; font-weight:700; cursor:pointer; border:none;
  transition:all var(--transition); display:inline-flex; align-items:center; gap:0.4rem;
}
.btn-primary { background:var(--brand-primary); color:#fff; box-shadow:0 2px 8px rgba(26,86,219,0.3); }
.btn-primary:hover { filter:brightness(1.1); transform:translateY(-1px); box-shadow:0 4px 16px rgba(26,86,219,0.4); }
.btn-danger { background:var(--color-danger); color:#fff; }
.btn-danger:hover { filter:brightness(1.1); }
.btn-success { background:var(--color-success); color:#fff; }
.btn-ghost { background:var(--bg-base); color:var(--text-secondary); border:1px solid var(--border-color); }
.btn-ghost:hover { color:var(--text-primary); border-color:var(--text-secondary); }
.btn-sm { padding:0.32rem 0.75rem; font-size:0.72rem; }
.btn-xs { padding:0.22rem 0.55rem; font-size:0.65rem; }
.btn-icon { width:32px; height:32px; padding:0; justify-content:center; border-radius:var(--radius-sm); }

/* Tables */
table { width:100%; border-collapse:collapse; font-size:0.8rem; }
th {
  background:var(--bg-nav); color:rgba(255,255,255,0.8);
  padding:0.65rem 1rem; text-align:left; font-size:0.7rem;
  font-weight:700; letter-spacing:0.06em; text-transform:uppercase;
}
td { padding:0.72rem 1rem; border-bottom:1px solid var(--border-color); color:var(--text-primary); vertical-align:middle; }
tr:last-child td { border-bottom:none; }
tr:hover td { background:var(--bg-base); }

/* Progress bars */
.prog-row { display:flex; align-items:center; gap:0.8rem; margin-bottom:0.75rem; }
.prog-label { width:110px; color:var(--text-secondary); flex-shrink:0; font-size:0.78rem; font-weight:500; }
.prog-track { flex:1; height:7px; background:var(--border-color); border-radius:var(--radius-full); overflow:hidden; }
.prog-fill { height:100%; border-radius:var(--radius-full); transition:width 0.8s cubic-bezier(0.4,0,0.2,1); }
.prog-pct { width:38px; text-align:right; font-weight:700; color:var(--text-primary); font-size:0.78rem; }

/* Callouts */
.callout {
  border-radius:var(--radius-md); padding:1rem 1.25rem; margin-bottom:1.2rem;
  display:flex; gap:0.8rem; font-size:0.83rem; border-left:4px solid; align-items:flex-start;
}
.callout-icon { font-size:1.1rem; flex-shrink:0; margin-top:1px; }
.callout-text { line-height:1.6; color:var(--text-secondary); }
.callout-text strong { color:var(--text-primary); font-weight:700; }
.c-tip  { background:var(--color-success-bg); border-color:var(--color-success); }
.c-info { background:var(--color-info-bg);    border-color:var(--color-info); }
.c-warn { background:var(--color-warning-bg); border-color:var(--color-warning); }
.c-danger { background:var(--color-danger-bg); border-color:var(--color-danger); }

/* Modal */
.modal-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.6); z-index:9000;
  align-items:center; justify-content:center;
  padding:1rem; backdrop-filter:blur(4px);
}
.modal-overlay.open { display:flex; }
.modal {
  background:var(--bg-surface); border-radius:var(--radius-xl);
  padding:2rem; width:100%; max-width:480px;
  box-shadow:var(--shadow-xl); animation:slideUp 0.3s cubic-bezier(0.22,1,0.36,1) both;
  max-height:92vh; overflow-y:auto; border:1px solid var(--border-color);
}
.modal-title { font-family:'Fraunces',serif; font-size:1.35rem; color:var(--text-primary); margin-bottom:1.5rem; }
.modal-btns { display:flex; gap:0.7rem; justify-content:flex-end; margin-top:1.5rem; flex-wrap:wrap; }

/* Form fields */
.mfield { margin-bottom:1rem; }
.mfield label {
  display:block; font-size:0.7rem; font-weight:700;
  color:var(--text-secondary); margin-bottom:0.35rem;
  text-transform:uppercase; letter-spacing:0.08em;
}
.mfield input, .mfield select, .mfield textarea {
  width:100%; padding:0.68rem 0.9rem;
  border:1.5px solid var(--border-color); border-radius:var(--radius-sm);
  font-size:0.87rem; outline:none;
  background:var(--bg-input); color:var(--text-primary);
  transition:border-color var(--transition), box-shadow var(--transition);
}
.mfield input:focus, .mfield select:focus, .mfield textarea:focus {
  border-color:var(--border-focus);
  box-shadow:0 0 0 3px rgba(26,86,219,0.12);
}
.mfield textarea { resize:vertical; min-height:80px; }

/* Grid helpers */
.g2 { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
.g3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1rem; }

/* Divider */
.divider { height:1px; background:var(--border-color); margin:1.5rem 0; }

/* Filter row */
.filter-row { display:flex; gap:0.75rem; flex-wrap:wrap; margin-bottom:1.2rem; align-items:center; }
.search-box {
  padding:0.52rem 0.9rem; border:1.5px solid var(--border-color);
  border-radius:var(--radius-sm); font-size:0.82rem; outline:none;
  background:var(--bg-input); color:var(--text-primary);
  min-width:200px; transition:border-color var(--transition);
}
.search-box:focus { border-color:var(--border-focus); }
.filter-sel {
  padding:0.52rem 0.9rem; border:1.5px solid var(--border-color);
  border-radius:var(--radius-sm); font-size:0.82rem;
  background:var(--bg-input); color:var(--text-primary); cursor:pointer; outline:none;
}

/* Animations */
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes staggerIn {
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:none}
}
.anim-1 { animation:staggerIn 0.4s ease both; }
.anim-2 { animation:staggerIn 0.4s 0.06s ease both; }
.anim-3 { animation:staggerIn 0.4s 0.12s ease both; }
.anim-4 { animation:staggerIn 0.4s 0.18s ease both; }
.anim-5 { animation:staggerIn 0.4s 0.24s ease both; }

/* ═══════════════════════════════════════════
   SECTION 6: ATTENDANCE GRID
═══════════════════════════════════════════ */
.att-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:0.85rem; margin-top:1rem; }
.att-card {
  background:var(--bg-surface); border:2px solid var(--border-color);
  border-radius:var(--radius-md); padding:1rem 0.75rem;
  text-align:center; cursor:pointer; transition:all var(--transition);
  user-select:none;
}
.att-card:hover { transform:translateY(-2px); box-shadow:var(--shadow-md); }
.att-card.present { border-color:var(--color-success); background:var(--color-success-bg); }
.att-card.absent  { border-color:var(--color-danger);  background:var(--color-danger-bg); }
.att-card.late    { border-color:var(--color-warning);  background:var(--color-warning-bg); }
.att-avatar {
  width:46px; height:46px; border-radius:50%; margin:0 auto 0.5rem;
  background:var(--bg-base); display:flex; align-items:center; justify-content:center;
  font-size:1.15rem; overflow:hidden; border:2px solid var(--border-color);
}
.att-avatar img { width:100%; height:100%; object-fit:cover; }
.att-name { font-size:0.73rem; font-weight:700; color:var(--text-primary); line-height:1.3; }
.att-status-text { font-size:0.65rem; margin-top:0.3rem; font-weight:700; }
.att-card.present .att-status-text { color:var(--color-success); }
.att-card.absent  .att-status-text { color:var(--color-danger); }
.att-card.late    .att-status-text { color:var(--color-warning); }
.att-controls { display:flex; gap:3px; justify-content:center; margin-top:0.5rem; }
.att-btn {
  font-size:0.6rem; padding:0.15rem 0.45rem; border-radius:4px;
  border:1.5px solid currentColor; background:transparent; cursor:pointer;
  font-weight:800; transition:all 0.15s; color:inherit;
}
.att-btn-p { color:var(--color-success); }
.att-btn-p:hover, .att-card.present .att-btn-p { background:var(--color-success); color:#fff; }
.att-btn-a { color:var(--color-danger); }
.att-btn-a:hover, .att-card.absent .att-btn-a { background:var(--color-danger); color:#fff; }
.att-btn-l { color:var(--color-warning); }
.att-btn-l:hover, .att-card.late .att-btn-l { background:var(--color-warning); color:#fff; }

/* ═══════════════════════════════════════════
   SECTION 7: SMART REPORT
═══════════════════════════════════════════ */
.report-outer {
  background:var(--bg-surface); border:1px solid var(--border-color);
  border-radius:var(--radius-xl); overflow:hidden; box-shadow:var(--shadow-lg);
  margin-bottom:1.5rem;
}
.report-banner {
  background:linear-gradient(130deg,#0f172a 0%,#1e3a8a 55%,#065f46 100%);
  padding:2rem 2rem 1.5rem; display:flex; justify-content:space-between;
  align-items:flex-start; flex-wrap:wrap; gap:1rem;
}
.rb-school { font-family:'Fraunces',serif; font-size:1.25rem; color:#fff; letter-spacing:-0.02em; }
.rb-meta { font-size:0.72rem; color:rgba(255,255,255,0.5); margin-top:0.2rem; text-transform:uppercase; letter-spacing:0.1em; }
.rb-student-name { font-size:1rem; font-weight:700; color:#fff; text-align:right; }
.rb-student-meta { font-size:0.72rem; color:rgba(255,255,255,0.5); text-align:right; margin-top:0.2rem; }

.report-summary {
  padding:1.5rem 2rem; display:flex; align-items:center; gap:2rem;
  flex-wrap:wrap; border-bottom:1px solid var(--border-color);
}
.score-ring-wrap { position:relative; width:90px; height:90px; flex-shrink:0; }
.score-ring-svg { transform:rotate(-90deg); }
.ring-track { fill:none; stroke:var(--border-color); stroke-width:8; }
.ring-prog { fill:none; stroke-width:8; stroke-linecap:round; transition:stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1); }
.ring-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.ring-num { font-family:'Fraunces',serif; font-size:1.3rem; font-weight:700; line-height:1; color:var(--text-primary); }
.ring-lbl { font-size:0.58rem; color:var(--text-muted); font-weight:600; margin-top:1px; }
.summary-text h3 { font-size:1rem; font-weight:700; color:var(--text-primary); }
.summary-text p { font-size:0.82rem; color:var(--text-secondary); margin-top:0.2rem; }
.grade-pill {
  display:inline-flex; align-items:center; gap:0.4rem;
  border-radius:var(--radius-full); padding:0.3rem 0.85rem;
  font-size:0.75rem; font-weight:700; margin-top:0.6rem;
  background:var(--color-info-bg); color:var(--color-info);
}

.report-table-wrap { padding:0 2rem 1rem; overflow-x:auto; }
.report-footer-grid {
  display:grid; grid-template-columns:1fr 1fr 1fr;
  gap:1.5rem; padding:1.25rem 2rem;
  background:var(--bg-base); border-top:1px solid var(--border-color);
}
.rfc-label { font-size:0.62rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-muted); font-weight:700; margin-bottom:0.3rem; }
.rfc-value { font-size:0.85rem; font-weight:700; color:var(--text-primary); }
.rfc-note { font-size:0.75rem; color:var(--text-secondary); margin-top:0.2rem; line-height:1.5; }
.report-actions { padding:1rem 2rem; border-top:1px solid var(--border-color); display:flex; gap:0.7rem; justify-content:flex-end; }

/* ═══════════════════════════════════════════
   SECTION 8: TIMETABLE
═══════════════════════════════════════════ */
.tt-wrap { overflow-x:auto; }
.tt-grid {
  display:grid;
  grid-template-columns:72px repeat(5,1fr);
  gap:5px; min-width:600px;
}
.tt-hdr {
  background:var(--bg-nav); color:rgba(255,255,255,0.75);
  padding:0.55rem; border-radius:var(--radius-sm);
  text-align:center; font-weight:700; font-size:0.68rem;
  text-transform:uppercase; letter-spacing:0.06em;
}
.tt-time {
  background:var(--bg-base); padding:0.5rem;
  border-radius:var(--radius-sm); text-align:center;
  color:var(--text-muted); font-weight:700; font-size:0.68rem;
  display:flex; align-items:center; justify-content:center;
}
.tt-cell {
  background:var(--bg-surface); border:1px solid var(--border-color);
  padding:0.5rem 0.6rem; border-radius:var(--radius-sm);
  min-height:58px; display:flex; flex-direction:column; justify-content:center;
  transition:box-shadow var(--transition);
}
.tt-cell:hover { box-shadow:var(--shadow-md); }
.tt-subj { font-weight:700; color:var(--text-primary); font-size:0.73rem; }
.tt-teacher { font-size:0.65rem; color:var(--text-secondary); margin-top:2px; }
.tt-room { font-size:0.6rem; color:var(--text-muted); }
.tt-free { background:var(--bg-base); border-style:dashed; }
.tt-break {
  grid-column:2/7; border-radius:var(--radius-sm); padding:0.5rem;
  text-align:center; color:#fff; font-size:0.72rem; font-weight:700;
  letter-spacing:0.06em;
  background:linear-gradient(135deg,var(--color-teal),#134e4a);
}

/* ═══════════════════════════════════════════
   SECTION 9: PROFILE & PHOTO
═══════════════════════════════════════════ */
.profile-hero {
  background:var(--bg-surface); border:1px solid var(--border-color);
  border-radius:var(--radius-xl); padding:1.75rem;
  display:flex; gap:1.5rem; align-items:flex-start;
  margin-bottom:1.5rem; flex-wrap:wrap; box-shadow:var(--shadow-sm);
}
.profile-pic-wrap { position:relative; flex-shrink:0; }
.profile-pic {
  width:88px; height:88px; border-radius:50%; overflow:hidden;
  border:3px solid var(--border-color); background:var(--bg-base);
  display:flex; align-items:center; justify-content:center; font-size:2rem;
}
.profile-pic img { width:100%; height:100%; object-fit:cover; }
.profile-edit-btn {
  position:absolute; bottom:2px; right:2px;
  width:26px; height:26px; border-radius:50%;
  background:var(--brand-primary); border:2px solid var(--bg-surface);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:0.65rem; color:#fff; transition:background var(--transition);
}
.profile-edit-btn:hover { background:#1e40af; }
.profile-info h2 { font-size:1.2rem; font-weight:700; color:var(--text-primary); }
.profile-subtitle { font-size:0.8rem; color:var(--text-secondary); margin-top:0.2rem; }
.profile-tags { display:flex; gap:0.5rem; flex-wrap:wrap; margin-top:0.7rem; }

/* ═══════════════════════════════════════════
   SECTION 10: GRADE ENTRY
═══════════════════════════════════════════ */
.grade-entry-row {
  background:var(--bg-surface); border:1px solid var(--border-color);
  border-radius:var(--radius-md); padding:0.9rem 1rem;
  display:flex; align-items:center; gap:1rem; flex-wrap:wrap;
  margin-bottom:0.5rem; transition:box-shadow var(--transition);
}
.grade-entry-row:hover { box-shadow:var(--shadow-sm); }
.ge-name { font-size:0.85rem; font-weight:600; color:var(--text-primary); flex:1; min-width:140px; }
.ge-score {
  width:72px; padding:0.42rem 0.6rem;
  border:1.5px solid var(--border-color); border-radius:var(--radius-sm);
  font-size:0.85rem; font-family:'JetBrains Mono',monospace;
  text-align:center; outline:none; background:var(--bg-input); color:var(--text-primary);
  transition:border-color var(--transition);
}
.ge-score:focus { border-color:var(--border-focus); }
.ge-letter { min-width:30px; text-align:center; font-size:0.85rem; font-weight:700; }

/* ═══════════════════════════════════════════
   SECTION 11: ANNOUNCEMENT
═══════════════════════════════════════════ */
.ann-item {
  background:var(--bg-surface); border:1px solid var(--border-color);
  border-radius:var(--radius-md); padding:1.1rem 1.3rem;
  margin-bottom:0.75rem; border-left:4px solid var(--brand-primary);
  transition:box-shadow var(--transition), background var(--transition-slow);
  box-shadow:var(--shadow-sm);
}
.ann-item:hover { box-shadow:var(--shadow-md); }
.ann-item.pinned { border-left-color:var(--brand-accent); background:var(--color-warning-bg); }
.ann-title { font-size:0.92rem; font-weight:700; color:var(--text-primary); }
.ann-meta  { font-size:0.7rem; color:var(--text-muted); margin-top:0.2rem; }
.ann-body  { font-size:0.82rem; color:var(--text-secondary); margin-top:0.5rem; line-height:1.6; }

/* ═══════════════════════════════════════════
   SECTION 12: PARENT PORTAL
═══════════════════════════════════════════ */
.parent-child-card {
  background:linear-gradient(135deg,var(--bg-surface) 0%,var(--bg-base) 100%);
  border:1px solid var(--border-color); border-radius:var(--radius-xl);
  padding:1.5rem; margin-bottom:1.5rem; box-shadow:var(--shadow-sm);
}
.parent-child-header { display:flex; align-items:center; gap:1rem; margin-bottom:1.2rem; }
.parent-child-avatar {
  width:56px; height:56px; border-radius:50%; background:var(--color-purple-bg);
  color:var(--color-purple); display:flex; align-items:center; justify-content:center;
  font-size:1.4rem; font-weight:700; overflow:hidden; flex-shrink:0;
}
.parent-child-avatar img { width:100%; height:100%; object-fit:cover; }

/* ═══════════════════════════════════════════
   SECTION 13: RESPONSIVE
═══════════════════════════════════════════ */
@media(max-width:820px) {
  .sidebar { display:none; }
  .g2,.g3 { grid-template-columns:1fr; }
  .main { padding:1.25rem; }
  .report-footer-grid { grid-template-columns:1fr; }
  .stat-grid { grid-template-columns:1fr 1fr; }
}
@media print {
  .topbar,.sidebar,.btn,.filter-row,.callout,
  .report-actions,.modal-overlay { display:none !important; }
  .report-banner { print-color-adjust:exact; -webkit-print-color-adjust:exact; }
}

/* Hidden */
.hidden { display:none !important; }
.hidden-file { display:none; }
</style>
</head>
<body>

<!-- ═══════════════════ LOGIN SCREEN ═══════════════════ -->
<div id="loginScreen" class="screen active">
  <div class="login-bg">
    <div class="login-grid"></div>
    <div class="login-orb"></div>
    <div class="login-orb"></div>
    <div class="login-orb"></div>
  </div>

  <div class="login-wrap">
    <div class="login-brand">
      <div class="login-logo-text">Edu<span>Build</span></div>
      <div class="login-tagline" data-t="tagline">International School Platform</div>
    </div>

    <!-- SIGN IN CARD -->
    <div class="login-card" id="loginCard">
      <div class="role-selector" id="roleSelector">
        <button class="role-tab active" onclick="selectRole('superadmin',this)">
          <span class="role-tab-icon">👑</span>
          <span data-t="role_superadmin">Super Admin</span>
        </button>
        <button class="role-tab" onclick="selectRole('headteacher',this)">
          <span class="role-tab-icon">🎓</span>
          <span data-t="role_headteacher">Head Teacher</span>
        </button>
        <button class="role-tab" onclick="selectRole('teacher',this)">
          <span class="role-tab-icon">👩‍🏫</span>
          <span data-t="role_teacher">Teacher</span>
        </button>
        <button class="role-tab" onclick="selectRole('student',this)">
          <span class="role-tab-icon">👨‍🎓</span>
          <span data-t="role_student">Student</span>
        </button>
        <button class="role-tab" onclick="selectRole('parent',this)">
          <span class="role-tab-icon">👪</span>
          <span data-t="role_parent">Parent</span>
        </button>
      </div>

      <div class="lf-group">
        <label class="lf-label" data-t="label_username">Username</label>
        <input class="lf-input" id="lUser" type="text" autocomplete="username" onkeydown="if(event.key==='Enter')doLogin()"/>
      </div>
      <div class="lf-group">
        <label class="lf-label" data-t="label_password">Password</label>
        <input class="lf-input" id="lPass" type="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/>
      </div>
      <button class="login-submit" onclick="doLogin()" data-t="btn_signin">Sign In →</button>
      <div class="login-err" id="loginErr" data-t="err_login">Incorrect username or password.</div>

      <div class="login-register-link" id="registerLinkWrap">
        <span data-t="no_account">New teacher or student?</span>
        <a onclick="showRegister()" data-t="create_account"> Create your account</a>
      </div>
    </div>

    <!-- REGISTER CARD -->
    <div class="register-card" id="registerCard">
      <div style="color:#fff;margin-bottom:1.5rem">
        <div style="font-family:'Fraunces',serif;font-size:1.3rem;margin-bottom:0.3rem" data-t="register_title">Create Your Account</div>
        <div style="font-size:0.78rem;color:rgba(255,255,255,0.4)" data-t="register_sub">Teachers and students only. Admins are pre-configured.</div>
      </div>
      <div class="lf-group">
        <label class="lf-label" data-t="label_fullname">Full Name</label>
        <input class="lf-input" id="reg_name" placeholder="John Doe"/>
      </div>
      <div class="g2" style="gap:0.75rem;margin-bottom:1rem">
        <div>
          <label class="lf-label" data-t="label_username">Username</label>
          <input class="lf-input" id="reg_user" placeholder="john.doe"/>
        </div>
        <div>
          <label class="lf-label" data-t="label_password">Password</label>
          <input class="lf-input" id="reg_pass" type="password" placeholder="Min 6 chars"/>
        </div>
      </div>
      <div class="lf-group">
        <label class="lf-label" data-t="label_role">I am a</label>
        <select class="lf-input" id="reg_role" onchange="toggleRegFields()">
          <option value="teacher">Teacher</option>
          <option value="student">Student</option>
        </select>
      </div>
      <div id="reg_teacher_fields">
        <div class="lf-group">
          <label class="lf-label">Subject</label>
          <input class="lf-input" id="reg_subject" placeholder="e.g. Mathematics"/>
        </div>
      </div>
      <div id="reg_student_fields" class="hidden">
        <div class="g2" style="gap:0.75rem;margin-bottom:1rem">
          <div>
            <label class="lf-label">Class</label>
            <input class="lf-input" id="reg_class" placeholder="Grade 9A"/>
          </div>
          <div>
            <label class="lf-label">Date of Birth</label>
            <input class="lf-input" id="reg_dob" type="date"/>
          </div>
        </div>
        <div class="lf-group">
          <label class="lf-label">Parent / Guardian Name</label>
          <input class="lf-input" id="reg_parent" placeholder="Full name"/>
        </div>
      </div>
      <div class="lf-group">
        <label class="lf-label">School</label>
        <select class="lf-input" id="reg_school">
          <option value="s1">Greenfield International Academy · Kigali</option>
          <option value="s2">Horizon Global School · Nairobi</option>
          <option value="s3">EduStar Learning Centre · Kampala</option>
        </select>
      </div>
      <button class="login-submit" onclick="doRegister()" data-t="btn_register">Create Account</button>
      <div class="login-register-link" style="margin-top:1rem">
        <a onclick="showLogin()" data-t="back_login">← Back to Sign In</a>
      </div>
    </div>

    <!-- Language switcher on login -->
    <div style="display:flex;gap:8px;margin-top:0.5rem">
      <button class="lang-btn active" onclick="setLang('en')" style="color:rgba(255,255,255,0.5);background:transparent;border:1px solid rgba(255,255,255,0.15);border-radius:6px;padding:0.3rem 0.7rem;font-size:0.72rem;font-weight:700;cursor:pointer">EN</button>
      <button class="lang-btn" onclick="setLang('fr')" style="color:rgba(255,255,255,0.5);background:transparent;border:1px solid rgba(255,255,255,0.15);border-radius:6px;padding:0.3rem 0.7rem;font-size:0.72rem;font-weight:700;cursor:pointer">FR</button>
      <button class="lang-btn" onclick="setLang('rw')" style="color:rgba(255,255,255,0.5);background:transparent;border:1px solid rgba(255,255,255,0.15);border-radius:6px;padding:0.3rem 0.7rem;font-size:0.72rem;font-weight:700;cursor:pointer">RW</button>
    </div>
  </div>
</div>

<!-- ═══════════════════ APP SHELL ═══════════════════ -->
<div id="appScreen" class="screen">
  <nav class="topbar">
    <div class="topbar-left">
      <div class="topbar-brand">Edu<span>Build</span></div>
      <div class="lang-switcher">
        <button class="lang-btn active" onclick="setLang('en')">EN</button>
        <button class="lang-btn" onclick="setLang('fr')">FR</button>
        <button class="lang-btn" onclick="setLang('rw')">RW</button>
      </div>
    </div>
    <div class="topbar-right">
      <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" title="Toggle dark mode">🌙</button>
      <div class="topbar-avatar-wrap">
        <div class="topbar-avatar" id="topbarAvatar">?</div>
        <div>
          <div class="topbar-name" id="topbarName">—</div>
          <div class="topbar-role-badge" id="topbarRole">—</div>
        </div>
      </div>
      <button class="signout-btn" onclick="signOut()" data-t="btn_signout">← Sign Out</button>

function t(key) {
  return TRANSLATIONS[currentLang]?.[key] || TRANSLATIONS.en[key] || key;

function setLang(lang) {
  currentLang = lang;
  // Update all static data-t elements
  document.querySelectorAll('[data-t]').forEach(el => {
    const key = el.getAttribute('data-t');
    if (el.tagName === 'INPUT') el.placeholder = t(key);
    else el.textContent = t(key);
  });
  // Refresh active lang buttons
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === lang.toUpperCase());
  });
  // Rebuild sidebar & pages if logged in
  if (currentUser) { buildSidebar(); buildMainPages(); activatePage(currentActivePage || 'dashboard'); }
}

let currentUser = null;
let selectedRole = 'superadmin';
let currentActivePage = 'dashboard';

function getAllUsers() {
  return [...FIXED_USERS, ...DYNAMIC_USERS];
}

function selectRole(role, el) {
  selectedRole = role;
  document.querySelectorAll('.role-tab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  // Only show register link for teacher/student
  const regLink = document.getElementById('registerLinkWrap');
  if (regLink) regLink.style.display = (role === 'teacher' || role === 'student') ? 'block' : 'none';
}

function doLogin() {
  const u = document.getElementById('lUser').value.trim();
  const p = document.getElementById('lPass').value.trim();
  const all = getAllUsers();
  const user = all.find(x => x.username === u && x.pass === p && x.role === selectedRole);
  const err = document.getElementById('loginErr');
  if (!user) {
    err.style.display = 'block';
    setTimeout(() => err.style.display = 'none', 3000);
    return;
  }
  currentUser = user;
  launchApp();
}

function signOut() {
  currentUser = null;
  document.getElementById('appScreen').classList.remove('active');
  document.getElementById('loginScreen').classList.add('active');
  document.getElementById('lUser').value = '';
  document.getElementById('lPass').value = '';
  showLogin();
}

function showRegister() {
  document.getElementById('loginCard').classList.add('hidden');
  document.getElementById('registerCard').classList.add('active');
  // pre-select role from tab
  const roleEl = document.getElementById('reg_role');
  if (selectedRole === 'student') roleEl.value = 'student';
  else roleEl.value = 'teacher';
  toggleRegFields();
}

function showLogin() {
  document.getElementById('loginCard').classList.remove('hidden');
  document.getElementById('registerCard').classList.remove('active');
}

function toggleRegFields() {
  const role = document.getElementById('reg_role').value;
  document.getElementById('reg_teacher_fields').classList.toggle('hidden', role !== 'teacher');
  document.getElementById('reg_student_fields').classList.toggle('hidden', role !== 'student');
}

function doRegister() {
  const name = document.getElementById('reg_name').value.trim();
  const user = document.getElementById('reg_user').value.trim();
  const pass = document.getElementById('reg_pass').value.trim();
  const role = document.getElementById('reg_role').value;
  const school = document.getElementById('reg_school').value;
  if (!name || !user || pass.length < 6) { alert('Please fill all fields. Password must be at least 6 characters.'); return; }
  if (getAllUsers().find(u => u.username === user)) { alert('Username already taken. Choose another.'); return; }
  const id = role[0] + Date.now();
  const newUser = { id, name, username: user, pass, role, school, emoji: role === 'teacher' ? '👩‍🏫' : '👨‍🎓', pic: null };
  if (role === 'teacher') {
    newUser.subject = document.getElementById('reg_subject').value.trim() || 'TBD';
    newUser.class = 'TBD';
  } else {
    newUser.class = document.getElementById('reg_class').value.trim() || 'TBD';
    newUser.dob = document.getElementById('reg_dob').value;
    newUser.parentName = document.getElementById('reg_parent').value.trim();
    GRADES_DATA[id] = {};
  }
  DYNAMIC_USERS.push(newUser);
  alert(`Account created! Welcome, ${name}. You can now sign in.`);
  showLogin();
}

function getTeachers(school) {
  return DYNAMIC_USERS.filter(u => u.role === 'teacher' && (!school || u.school === school));
}
function getStudents(school, cls) {
  return DYNAMIC_USERS.filter(u => u.role === 'student' && (!school || u.school === school) && (!cls || u.class === cls));
}
function getParents(school) {
  return DYNAMIC_USERS.filter(u => u.role === 'parent' && (!school || u.school === school));
}
function schoolName(id) {
  return SCHOOLS.find(s => s.id === id)?.name || '—';
}
function gradeAvg(sid) {
  const g = GRADES_DATA[sid] || {};
  const vals = Object.values(g).filter(v => v > 0);
  return vals.length ? Math.round(vals.reduce((a,b)=>a+b,0)/vals.length) : 0;
}
function gradeLetter(avg) {
  if (avg >= 90) return 'A'; if (avg >= 80) return 'B';
  if (avg >= 70) return 'C'; if (avg >= 60) return 'D'; return 'F';
}
function gradeColor(avg) {
  if (avg >= 80) return '#16a34a'; if (avg >= 70) return '#1d4ed8';
  if (avg >= 60) return '#d97706'; return '#dc2626';
}
function gradeLetterBadge(avg) {
  const l = gradeLetter(avg);
  const cls = l==='A'||l==='B' ? 'badge-success' : l==='C' ? 'badge-info' : l==='D' ? 'badge-warning' : 'badge-danger';
  return `<span class="badge ${cls}">${l}</span>`;
}
function todayStr() {
  return new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}

function activatePage(id) {
  currentActivePage = id;
  document.querySelectorAll('.sb-item').forEach(el => el.classList.remove('on'));
  const sbEl = document.getElementById('sb-' + id);
  if (sbEl) sbEl.classList.add('on');
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  const pg = document.getElementById('pg-' + id);
  if (pg) pg.classList.add('on');
}

function addPage(container, id, html) {
  const div = document.createElement('div');
  div.className = 'page';
  div.id = 'pg-' + id;
  div.innerHTML = html;
  container.appendChild(div);
}

function saveAnnounce() {
  const ti = document.getElementById('an_t').value.trim();
  const bo = document.getElementById('an_b').value.trim();
  if (!ti || !bo) { alert('Fill all fields.'); return; }
  const pin = document.getElementById('an_p').value === '1';
  const d = new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
  ANNOUNCEMENTS.unshift({id:'a'+Date.now(),title:ti,body:bo,author:currentUser.name,date:d,pinned:pin,school:currentUser.school||'s1'});
  closeModal(); buildMainPages(); activatePage('announcements');
}

function filterTable(input, tableId) {
  const q = input.value.toLowerCase();
  document.querySelectorAll(`#${tableId} tbody tr`).forEach(r => {

  });
}

function openEditTeacher(id) {
  const u = DYNAMIC_USERS.find(x=>x.id===id);
  if (!u) return;
  showModal(`
  <div class="modal-title">Edit Teacher</div>
  <div class="mfield"><label>Full Name</label><input id="et_n" value="${u.name}"/></div>
  <div class="g2">
    <div class="mfield"><label>Subject</label><input id="et_s" value="${u.subject||''}"/></div>
    <div class="mfield"><label>Class</label><input id="et_c" value="${u.class||''}"/></div>
  </div>
  <div class="modal-btns">
    <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    <button class="btn btn-danger btn-sm" onclick="deleteUser('${id}','teachers')">Delete</button>
    <button class="btn btn-primary" onclick="saveEditTeacher('${id}')">Save</button>
  </div>`);
}
function saveEditTeacher(id) {
  const u=DYNAMIC_USERS.find(x=>x.id===id);
  if(u){u.name=document.getElementById('et_n').value;u.subject=document.getElementById('et_s').value;u.class=document.getElementById('et_c').value;}
  closeModal();buildMainPages();activatePage('teachers');
}
function deleteUser(id, returnPage) {
  if(!confirm('Are you sure?'))return;
  const i=DYNAMIC_USERS.findIndex(x=>x.id===id);
  if(i>-1)DYNAMIC_USERS.splice(i,1);
  closeModal();buildMainPages();activatePage(returnPage);
}

/* ─── TIMETABLE ─── */
function buildTimetable() {
  const tt = TIMETABLE;
  const cellColors = ['#eff6ff','#f0fdf4','#fdf4ff','#fff7ed','#f0fdfa'];
  let html = `
  <div class="ph anim-1">
    <div class="ph-title">${t('nav_timetable')}</div>
    <div class="ph-sub">Weekly schedule — Term 2, 2026</div>
  </div>
  <div class="card"><div class="card-body"><div class="tt-wrap"><div class="tt-grid">
    <div class="tt-hdr">Time</div>
    ${tt.days.map(d=>`<div class="tt-hdr">${d}</div>`).join('')}`;

  tt.times.forEach((time,ti)=>{
    if (time === 'BREAK') {
      html += `<div class="tt-time" style="color:transparent">—</div><div class="tt-break">☕ Break · 10:00 – 11:15</div>`;
      return;
    }
    html += `<div class="tt-time">${time}</div>`;
    tt.slots.forEach((day,di)=>{
      const slot = day[ti];
      if (!slot) {
        html += `<div class="tt-cell tt-free"><span style="font-size:0.65rem;color:var(--text-muted)">Free</span></div>`;
      } else {
        const bg = cellColors[ti % cellColors.length];
        html += `<div class="tt-cell" style="background:${bg}"><div class="tt-subj">${slot.s}</div><div class="tt-teacher">${slot.t}</div><div class="tt-room">${slot.r}</div></div>`;
      }
    });
  });

  html += `</div></div></div></div>`;
  return html;
}

function statusLabel(s) { return s==='present'?'✅ Present':s==='absent'?'❌ Absent':'⏱ Late'; }
function setAtt(id, status, e) {
  e.stopPropagation();

  ATTENDANCE_DATA[today][id] = status;

  document.getElementById('atts_'+id).textContent = statusLabel(status);

function saveAttendance() {
  const today = new Date().toISOString().split('T')[0];
  const data = ATTENDANCE_DATA[today]||{};
  const p = Object.values(data).filter(v=>v==='present').length;
  const a = Object.values(data).filter(v=>v==='absent').length;
  const l = Object.values(data).filter(v=>v==='late').length;
  alert(`${t('att_saved')}\n✅ Present: ${p}\n❌ Absent: ${a}\n⏱ Late: ${l}`);
}

        </svg>
        <div class="ring-center">

          <div class="ring-lbl">Overall</div>
        </div>
      </div>
      <div class="summary-text">
        <h3>${student.name}</h3>
        <p>${student.class} · ${term} · ${school.name}</p>
        <div class="grade-pill">🏆 Grade ${letter} · ${comments[letter].split('.')[0]}</div>
      </div>

    <div class="report-table-wrap">
      <table>
        <thead><tr><th>Subject</th><th>Score /100</th><th>Grade</th><th>Performance Bar</th><th>Remark</th></tr></thead>

        ${subjects.map(sub=>{

            <td style="font-weight:600">${sub}</td>
            <td><span class="mono" style="font-weight:700;color:${c}">${v}</span></td>

            <td style="font-size:0.75rem;color:var(--text-secondary)">${v>=80?'Excellent':v>=70?'Good':v>=60?'Satisfactory':'Needs Work'}</td>
          </tr>`;
        }).join('')}
        </tbody>
      </table>
    </div>

    <div class="report-footer-grid">
      <div>
        <div class="rfc-label">Class Teacher Remarks</div>

function buildParentChild() {
  const children = (currentUser.children||[]).map(id=>DYNAMIC_USERS.find(u=>u.id===id)).filter(Boolean);
  if (!children.length) return `<div class="ph anim-1"><div class="ph-title">${t('nav_mychild')}</div></div><div class="callout c-warn anim-2"><span class="callout-icon">👪</span><div class="callout-text">No children linked to your account. Contact school admin to link your child's account.</div></div>`;
  return `
  <div class="ph anim-1"><div class="ph-title">${t('nav_mychild')}</div><div class="ph-sub">Your child's academic overview</div></div>
  ${children.map((ch,i)=>{
    const g=GRADES_DATA[ch.id]||{};
    const subjects=Object.keys(g);
    const avg=gradeAvg(ch.id);
    return `
    <div class="parent-child-card anim-${i+2}">
      <div class="parent-child-header">
        <div class="parent-child-avatar">${ch.pic?`<img src="${ch.pic}">`:(ch.name[0])}</div>
        <div>
          <div style="font-weight:700;font-size:1rem;color:var(--text-primary)">${ch.name}</div>
          <div style="font-size:0.8rem;color:var(--text-secondary)">${ch.class} · ${schoolName(ch.school)}</div>
          <div style="margin-top:0.4rem">
            <span class="badge badge-info">Avg ${avg}%</span>
            <span class="badge ${avg>=80?'badge-success':avg>=60?'badge-info':'badge-warning'}">${gradeLetter(avg)}</span>
          </div>
        </div>
      </div>
      ${subjects.length ? `<div style="margin-top:1rem">
        ${subjects.map(sub=>{const v=g[sub];return `<div class="prog-row"><div class="prog-label">${sub}</div><div class="prog-track"><div class="prog-fill" style="width:${v}%;background:${gradeColor(v)}"></div></div><div class="prog-pct">${v}%</div></div>`;}).join('')}
      </div>` : '<div style="font-size:0.82rem;color:var(--text-muted);margin-top:0.5rem">No grades recorded yet.</div>'}
      <div class="callout c-info" style="margin-top:1rem;margin-bottom:0">
        <span class="callout-icon">ℹ️</span>
        <div class="callout-text">Full Smart Reports are confidential and only available to the Head Teacher and Admin. Contact the school office for a printed report.</div>
      </div>
    </div>`;
  }).join('')}`;
}

/* ─── PARENT ATTENDANCE VIEW ─── */
function buildParentAttendance() {
  const children = (currentUser.children||[]).map(id=>DYNAMIC_USERS.find(u=>u.id===id)).filter(Boolean);
  const today = new Date().toISOString().split('T')[0];
  const data = ATTENDANCE_DATA[today]||{};
  return `
  <div class="ph anim-1"><div class="ph-title">${t('nav_parent_attendance')}</div><div class="ph-sub">${todayStr()}</div></div>
  ${children.map(ch=>{
    const status = data[ch.id]||'No record yet';
    const badgeCls = status==='present'?'badge-success':status==='absent'?'badge-danger':status==='late'?'badge-warning':'badge-muted';
    return `<div class="card anim-2">
      <div class="card-body" style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap">
        <div class="parent-child-avatar" style="width:48px;height:48px;flex-shrink:0">${ch.pic?`<img src="${ch.pic}">`:(ch.name[0])}</div>
        <div style="flex:1">
          <div style="font-weight:700;color:var(--text-primary)">${ch.name}</div>
          <div style="font-size:0.78rem;color:var(--text-secondary)">${ch.class}</div>
        </div>
        <span class="badge ${badgeCls}" style="font-size:0.78rem">${statusLabel(status)||status}</span>
      </div>
    </div>`;
  }).join('')}
  <div class="callout c-info anim-3"><span class="callout-icon">📅</span><div class="callout-text">Attendance is marked daily by your child's class teacher. Contact the school if you believe there's an error.</div></div>`;
}

/* ════════════════════════════════════════════════════════
   MODULE I: PROFILE PHOTO SYSTEM
════════════════════════════════════════════════════════ */
let picTarget = null;

function openPicModal(id, type) {
  picTarget = { id, type };
  document.getElementById('picFileInput').click();
}

function handlePicUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const dataUrl = e.target.result;
    const { id, type } = picTarget;
    if (type === 'self') {
      currentUser.pic = dataUrl;
      // Update topbar
      const av = document.getElementById('topbarAvatar');
      av.innerHTML = `<img src="${dataUrl}">`;
    } else {
      const target = DYNAMIC_USERS.find(u => u.id === id);
      if (target) target.pic = dataUrl;
    }
    event.target.value = '';
    buildMainPages();
    activatePage(currentActivePage || 'dashboard');
  };
  reader.readAsDataURL(file);
}
